services:
  retrieval:
    build: .
    image: histopath-retrieval:latest
    ports:
      - "8000:8000"
    volumes:
      # Model weights (HuggingFace / timm cache) — persisted so downloads happen once
      - ./model_cache:/model_cache
      # FAISS index + metadata — built by 'make build-index'
      - ./index_store:/index_store
      # Dataset images — populated by 'make download-data'
      - ./data:/data
      # Live-reload config without rebuild (optional; comment out in production)
      - ./config.yaml:/app/config.yaml:ro
      # DEV ONLY — live-mount source so code edits don't need an image rebuild.
      # Remove these two before any real deployment (the image already bakes them in).
      - ./app:/app/app
      - ./scripts:/app/scripts
    env_file:
      - .env
    environment:
      - HF_HOME=/model_cache
      - TRANSFORMERS_CACHE=/model_cache
      - TORCH_HOME=/model_cache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # GPU support — requires nvidia-container-toolkit on the host.
    # Remove or comment out the `runtime` line to run CPU-only.
    runtime: nvidia
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
